<!DOCTYPE html>
<html>

<head>
  <link rel="stylesheet" href="/styles/styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
</head>

<body>
  <div id="adminFlag" data-is-admin="{{.IsAdmin}}" style="display:none"></div>

  <div class="title">
    <img src="/icons/logo.png" class="logo">
    PorschDucky
  </div>

  <nav class="menu-bar">
    <ul>
      <li><a href="/">Home</a></li>
      <li><a href="products" class="active">Products</a></li>
      {{if .UserID }}
      <li><a href="cart">Cart</a></li>
      <li><a href="profile">Profile</a></li>
      <li><a href="/api/users/logout">Logout</a></li>
      {{else}}
      <li><a href="login">Login</a></li>
      <li><a href="register">Register</a></li>
      {{end}}
    </ul>
  </nav>

  <!-- Category filter (always visible) -->
  <div class="category-bar">
    <label for="categorySelect">Filter by Category:</label>
    <select id="categorySelect">
      <option value="">All Categories</option>
    </select>

    <!-- Admin-only inputs -->
    {{if .IsAdmin}}
    <input id="newCategoryInput" type="text" placeholder="New category name" />
    <button id="addCategoryBtn">Add Category</button>
    <button id="removeCategoryBtn">Remove Category</button>
    {{end}}
  </div>

  <!-- Products grid -->
  <div class="container">
    <div class="product-grid" id="productGrid"></div>
  </div>

  <!-- Admin-only: Add Product -->
  {{if .IsAdmin}}
  <div class="add-product">
    <h2>Add Product</h2>

    <input id="name" placeholder="Product Name" />
    <input id="description" placeholder="Description" />
    <input id="manufacturer" placeholder="Manufacturer" />
    <input id="stock" type="number" placeholder="Stock" />
    <input id="price" type="number" step="0.01" placeholder="Price" />

    <select id="categorySelectForAdd">
      <option value="">Select a Category</option>
    </select>

    <button onclick="createProduct()">Add Product</button>
  </div>
  {{end}}



  {{if .IsAdmin}}
  <script src="/scripts/productsadmin.js"></script>
  {{else}}
  <script src="/scripts/products.js"></script>
  {{end}}
  <script src="/scripts/categories.js"></script>

</body>

</html>
