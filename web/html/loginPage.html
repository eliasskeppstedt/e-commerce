<body>
  <div class="login-container">
    <form class="login-form" method="POST" action="/api/users/login">
      <h2>🔥 Welcome Back 🔥</h2>
      <div class="input-group">
        <label for="input_login">Username</label>
        <input type="text" name ="input_login" id="input_login" placeholder="Enter your username" required>
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" name ="password" id="password" placeholder="Enter your password" required>
      </div>
      <div class="options">
      </div>
      <button type="submit">Login</button>
      <p class="signup-text">Don't have an account? <a href="/register">Sign up</a></p>
    </form>
  </div>
