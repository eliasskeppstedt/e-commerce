<body>
  <div class="signup-container">
    <form class="signup-form" action="/api/users/register" method="POST">
      <h2>🔥 Create Your Account 🔥</h2>

  <div class="input-group">
    <label for="username">Username</label>
    <input type="text" name="username" id="username" placeholder="Choose a username" required>
  </div>

  <div class="input-group">
    <label for="password">Password</label>
    <input type="password" name="password" id="password" placeholder="Enter password" required>
  </div>

      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" name ="email" id="email" placeholder="Enter your email" required>
      </div>
      <div class="input-group">
        <label for="firstname">First Name</label>
        <input type="text" name = "first_name" id="first_name" placeholder="First name">
      </div>

      <div class="input-group">
        <label for="lastname">Last Name</label>
        <input type="text" name = "last_name" id="last_name" placeholder="Last name">
      </div>

      <div class="input-group">
        <label for="address">Address</label>
        <input type="text" name = "address" id="address" placeholder="Street address">
      </div>

      <div class="input-group">
        <label for="zipcode">Zip Code</label>
        <input type="text" name = "zip_code" id="zip_code" placeholder="Zip code">
      </div>

      <div class="input-group">
        <label for="phonenumber">Phone Number</label>
        <input type="tel" name = "phone_number" id="phone_number" placeholder="Phone number">
      </div>

      <!--<div class="checkbox-group">
        <label>
          <input type="checkbox" required> I agree to the <a href="#">Terms & Conditions</a>
        </label>
      </div>-->

      <button type="submit">Sign Up</button>
    </form>
  </div>
</body>
</html>
