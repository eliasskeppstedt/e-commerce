<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="/styles/styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
</head>
<body>

<div class="title">
  <img src="/icons/logo.png" class="logo">
  PorschDucky
</div>

<nav class="menu-bar">
  <ul>
    <li><a href="/">Home</a></li>
    <li><a class="active">Products</a></li>
    <li><a href="cart">Cart</a></li>
    <li><a href="login">Login</a></li>
    <li><a href="register">Register</a></li>
  </ul>
</nav>

<!-- Category filter -->
<div class="category-bar">
  <label for="categorySelect">Filter by Category:</label>
  <select id="categorySelect" onchange="filterProductsByCategory(this.value)">
    <option value="">All Categories</option>
  </select>

  <input id="newCategoryInput" type="text" placeholder="New category name" />
  <button id="addCategoryBtn">Add Category</button>
  <button id="removeCategoryBtn">Remove Category</button>
</div>

<!-- Products render here -->
<div class="container">
  <div class="product-grid" id="productGrid"></div>
</div>

<!-- Add product -->
<div class="add-product">
  <h2>Add Product</h2>

  <input id="name" placeholder="Product Name" />
  <input id="description" placeholder="Description" />
  <input id="manufacturer" placeholder="Manufacturer" />
  <input id="stock" type="number" placeholder="Stock" />
  <input id="price" type="number" step="0.01" placeholder="Price" />

  <select id="categorySelectForAdd">
    <option value="">Select a Category</option>
  </select>

  <button onclick="addProduct()">Add Product</button>
</div>

<script src="/scripts/products.js"></script>
<script src="/scripts/categories.js"></script>
</body>
</html>
