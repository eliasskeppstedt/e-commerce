<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="../styles/styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="../icons/favicon-32x32.png">
  <title>PorschDucky - Profile</title>
</head>
<body>

<div class="title">
  <img src="../icons/logo.png" class="logo">
  PorschDucky
</div>



<nav class="menu-bar">
  <ul>
    <li><a href="/">Home</a></li>
    <li><a href="products">Products</a></li>
    {{if .UserID}}
      <li><a href="cart">Cart</a></li>
      <li><a href="profile" class="active">Profile</a></li>
      <li><a href="/api/users/logout">Logout</a></li>
    {{else}}
      <li><a href="login">Login</a></li>
      <li><a href="register">Register</a></li>
    {{end}}
  </ul>
</nav>

<div class="signup-container profile-container">
  <form class="signup-form" action="/api/users/infoUpdate" method="POST">
    <h2>👤 My Profile 👤</h2>

    <div class="input-group">
      <label for="username">Username</label>
      <input type="text" id="username" value="{{.Username}}" disabled>
    </div>

    <div class="input-group">
      <label for="email">Email</label>
      <input type="email" name="email" id="email" value="{{.Email}}" required>
    </div>

    <div class="input-group">
      <label for="first_name">First Name</label>
      <input type="text" name="first_name" id="first_name" value="{{.FirstName}}">
    </div>

    <div class="input-group">
      <label for="last_name">Last Name</label>
      <input type="text" name="last_name" id="last_name" value="{{.LastName}}">
    </div>

    <div class="input-group">
      <label for="address">Address</label>
      <input type="text" name="address" id="address" value="{{.Address}}">
    </div>

    <div class="input-group">
      <label for="zip_code">Zip Code</label>
      <input type="text" name="zip_code" id="zip_code" value="{{.ZipCode}}">
    </div>

    <div class="input-group">
      <label for="phone_number">Phone Number</label>
      <input type="tel" name="phone_number" id="phone_number" value="{{.Phone}}">
    </div>

    <button type="submit">Update Profile</button>
  </form>
</div>
<script>
document.addEventListener("DOMContentLoaded", function() {
    fetch("/api/users/profile")
    .then(response => {
        if (!response.ok) {
            window.location.href = "/login";
            return;
        }
        return response.json();
    })
    .then(data => {
        if (!data) return;
        document.getElementById("username").value = data.username;
        document.getElementById("email").value = data.email;
        document.getElementById("first_name").value = data.first_name;
        document.getElementById("last_name").value = data.last_name;
        document.getElementById("address").value = data.address;
        document.getElementById("zip_code").value = data.zip_code;
        document.getElementById("phone_number").value = data.phone;
    })
    .catch(err => console.error(err));
});
</script>
</body>
</html>
