<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="/styles/styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
</head>
<body>

<div class="title">
  <img src="../icons/logo.png" class="logo">
  PorschDucky
</div>

<nav class="menu-bar">
  <ul>
    <li><a href="/">Home</a></li>
    <li><a class="active">Products</a></li>
    <li><a href="cart">Cart</a></li>
    <li><a href="login">Login</a></li>
    <li><a href="register">Register</a></li>
  </ul>
</nav>

<div class="container">
  <div class="product-grid" id="productGrid">
    <!-- Products will be rendered here -->
  </div>
</div>

<div class="add-product">
  <h2>Add Product</h2>

  <input id="name" placeholder="Product Name" />
  <input id="description" placeholder="Description" />
  <input id="manufacturer" placeholder="Manufacturer" />
  <input id="stock" type="number" placeholder="Stock" />
  <input id="price" type="number" step="0.01" placeholder="Price" />
  <input id="category" placeholder="Category Name" />


  <button onclick="addProduct()">Add Product</button>
</div>

<script src="/scripts/products.js"></script>
</body>
</html>
